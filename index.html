let current=0;
let answers={};
let time=3600;
let interval;
let submitted=false;

function playSound(id){
  document.getElementById(id).play();
}

function updateStats(){
  let attempted = Object.keys(answers).length;
  document.getElementById("stats").innerText =
    `Attempted: ${attempted} / ${questions.length}`;
}

function loadQ(){
  let q=questions[current];
  document.getElementById("question").innerText="Q"+(current+1)+". "+q.q;

  let optDiv=document.getElementById("options");
  optDiv.innerHTML="";

  q.opt.forEach(o=>{
    let d=document.createElement("div");
    d.className="option";
    d.innerText=o;

    if(answers[current]==o) d.classList.add("selected");

    d.onclick=()=>{
      if(submitted) return;

      playSound("clickSound");
      answers[current]=o;

      document.querySelectorAll(".option")
      .forEach(x=>x.classList.remove("selected"));

      d.classList.add("selected");
      document.getElementById("btn"+current).classList.add("attempted");

      updateStats();
    };

    optDiv.appendChild(d);
  });

  if(submitted) review();
}

function showQuestionMeaning(){
  let q=questions[current];
  let box=document.getElementById("infoBox");
  box.style.display="block";
  box.innerHTML=`
    <h3 style="color:#facc15;">Meaning of Question</h3>
    <p>${q.explainQ}</p>
  `;
}

function showOptionMeaning(){
  let q=questions[current];
  let box=document.getElementById("infoBox");
  box.style.display="block";

  box.innerHTML=`
    <h3 style="color:#facc15;">Option Meaning</h3>
    <ul>
      ${q.opt.map(o=>`<li><b>${o}</b> → ${q.optMeaning[o]}</li>`).join("")}
    </ul>
  `;
}

function hideInfo(){
  document.getElementById("infoBox").style.display="none";
}

function togglePanel(){
  document.getElementById("panel").classList.toggle("hiddenPanel");
}

function review(){
  let q=questions[current];

  document.querySelectorAll(".option").forEach(opt=>{
    opt.classList.remove("selected");

    if(opt.innerText===q.ans){
      opt.classList.add("correct");
    }

    if(
      answers[current] &&
      answers[current]!==q.ans &&
      opt.innerText===answers[current]
    ){
      opt.classList.add("wrong");
    }
  });

  let box=document.getElementById("infoBox");
  box.style.display="block";
  box.innerHTML=`
    <h3 style="color:#22c55e;">Correct Answer</h3>
    <p><b>Answer:</b> ${q.ans}</p>
    <p>${q.ansExplain}</p>
  `;
}

function createPanel(){
  let p=document.getElementById("panel");

  questions.forEach((_,i)=>{
    let b=document.createElement("button");
    b.innerText=i+1;
    b.className="qbtn";
    b.id="btn"+i;

    b.onclick=()=>{
      current=i;
      loadQ();
    };

    p.appendChild(b);
  });

  updateStats();
}

function nextQ(){
  if(current<questions.length-1){
    current++;
    loadQ();
  }else{
    submitQuiz();
  }
}

function clearAns(){
  if(!submitted){
    delete answers[current];
    document.getElementById("btn"+current).classList.remove("attempted");
    updateStats();
    loadQ();
  }
}

function submitQuiz(){
  submitted=true;
  playSound("submitSound");
  clearInterval(interval);

  let c=0,w=0;

  questions.forEach((q,i)=>{
    let btn=document.getElementById("btn"+i);

    if(answers[i]===q.ans){
      c++;
      btn.classList.add("rightAnswer");
    }
    else if(answers[i]){
      w++;
      btn.classList.add("wrongAnswer");
    }
  });

  let score=c-(w*0.25);
  let percent=(score/questions.length)*100;

  document.getElementById("result").innerHTML=`
    <h3>Score: ${score}</h3>
    <p>Correct: ${c} | Wrong: ${w}</p>
    <p>Percent: ${percent.toFixed(2)}%</p>
  `;

  loadQ();
}

function timerRun(){
  interval=setInterval(()=>{
    time--;

    let m=Math.floor(time/60);
    let s=time%60;

    document.getElementById("timer").innerText=
      `${m}:${s<10?"0":s}`;

    if(time<=0) submitQuiz();
  },1000);
}

createPanel();
loadQ();
timerRun();

</script>
